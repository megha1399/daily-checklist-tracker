# Render Blueprint: https://render.com/docs/blueprint-spec
# After connecting the repo, set DATABASE_URL and JWT_SECRET in the Render dashboard
# (Environment → your Web Service → Environment).

services:
  - type: web
    name: daily-checklist-tracker
    runtime: node
    plan: free
    # Render sets NODE_ENV=production during build; devDependencies hold @angular/cli (ng).
    buildCommand: npm ci --include=dev && npm run build && npm install --omit=dev --prefix server
    startCommand: node server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: STATIC_DIR
        value: dist/habit-tracker/browser
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # Required for email verification (register): your public site URL, no trailing slash.
      - key: FRONTEND_URL
        sync: false
      # SMTP (e.g. Resend, SendGrid, Mailgun). See server/.env.example
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_REQUIRE_TLS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
